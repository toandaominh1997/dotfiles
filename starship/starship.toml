format = "$directory$git_branch$git_status$character"
right_format = "$cmd_duration"

add_newline = false

[line_break]
disabled = true

[character]
success_symbol = "[❯](bold #98c379)"
error_symbol = "[❯](bold #e06c75)"
vicmd_symbol = "[❮](bold #61afef)"

[hostname]
ssh_only = true
format = "[$hostname](bold #61afef) "
disabled = false

[directory]
format = "[ $path ]($style)[](fg:#2e5c8a) "
style = "bg:#2e5c8a fg:#ffffff bold"
truncation_length = 3
truncate_to_repo = false
read_only = " "

[git_branch]
symbol = " "
format = "[](fg:#3c4048)[ $symbol$branch ]($style)[](fg:#3c4048) "
style = "bg:#3c4048 fg:#d4d4d4"

[git_status]
format = "[$all_status$ahead_behind]($style) "
style = "fg:#e5c07b"
conflicted = "="
ahead = "⇡${count} "
behind = "⇣${count} "
diverged = "⇕⇡${ahead_count}⇣${behind_count} "
up_to_date = ""
untracked = "?${count} "
stashed = " "
modified = "!${count} "
staged = "+${count} "
renamed = "»${count} "
deleted = "${count} "

[cmd_duration]
min_time = 1000
format = "[ $duration ]($style)"
style = "bg:#4a4f5a fg:#ffffff"

[git_commit]
format = "[\\($hash\\)]($style) [\\($tag\\)]($style)"
style = "#98c379"

[git_state]
rebase = "REBASING"
merge = "MERGING"
revert = "REVERTING"
cherry_pick = "CHERRY-PICKING"
bisect = "BISECTING"
am = "AM"
am_or_rebase = "AM/REBASE"
style = "#e5c07b"
format = '\([$state( $progress_current/$progress_total)]($style)\) '
